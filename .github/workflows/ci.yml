name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      # The test suite shells real ffmpeg (eased-expression render checks), so
      # it must be on PATH — Footlight does not bundle it.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm run build
      - run: npm run coverage
      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: codecov/codecov-action@v6
        with:
          files: coverage/cobertura-coverage.xml
          flags: engine
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  app:
    name: app (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npx tsc --noEmit
        working-directory: app
      - run: npm run coverage
        working-directory: app
      - run: npm run build
        working-directory: app
      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: codecov/codecov-action@v6
        with:
          files: app/coverage/cobertura-coverage.xml
          flags: app
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
