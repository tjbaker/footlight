name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      # The test suite shells real ffmpeg (eased-expression render checks), so
      # it must be on PATH — Footlight does not bundle it.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm run build
      - run: npm run coverage
      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: codecov/codecov-action@v6
        with:
          files: coverage/cobertura-coverage.xml
          flags: engine
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # The native shell never compiled in CI before this job (CodeQL only analyzes
  # it statically), so a PR could break `cargo tauri build` and stay green.
  # `cargo check` is the cheapest "does it compile" gate — no bundling, no
  # release profile.
  tauri:
    name: tauri (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Tauri v2 Linux build deps, plus libdbus-1-dev for the keyring crate's
      # sync-secret-service backend.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      # tauri-build validates that frontendDist (app/dist) and the bundled
      # engine resource (the root dist/, see tauri.conf.json resources) exist;
      # empty dirs satisfy it without paying for the Vite/tsc builds here (the
      # engine and app jobs already do the real builds).
      - run: mkdir -p app/dist dist
      - run: cargo check --locked
        working-directory: app/src-tauri

  app:
    name: app (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json
      # The dev-server tests exercise app/dev-server/server.mjs, which imports
      # the shared pure builders from the ROOT package's dist/ — build it first.
      - run: npm ci
      - run: npm run build
      - run: npm ci
        working-directory: app
      - run: npx tsc --noEmit
        working-directory: app
      - run: npm run coverage
        working-directory: app
      - run: npm run build
        working-directory: app
      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: codecov/codecov-action@v6
        with:
          files: app/coverage/cobertura-coverage.xml
          flags: app
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
