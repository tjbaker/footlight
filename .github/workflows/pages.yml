#
# Deploys the footlight.dev site to GitHub Pages via the first-party artifact
# flow (Pages source = "GitHub Actions" — no serving branch). The site in site/
# is hand-written static HTML/CSS/JS with no build step, so the folder is
# uploaded as-is; CNAME and .nojekyll at its root publish verbatim. All actions
# are first-party, matching the rest of .github/workflows.
name: Deploy site to Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege: the deploy needs Pages + OIDC; source is read-only.
permissions:
  contents: read
  pages: write
  id-token: write

# One publish at a time; never cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
